<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Function scope example</title>
  </head>
<body>

  <script>
    function add7( number )
    {
       return number + 7 ;
    }

    function multiply( n1, n2)
    {
       return n1 * n2;
    }

    function capitalize( input_string )
    {
       let return_string;
       return_string = input_string[0].toUpperCase()
       return_string += input_string.slice(1).toLowerCase();
       return return_string;
    }

    function lastLetter( input_string )
    {
       return input_string.slice(-1);
    }
	
    let s1 = "aBcD";
    console.log(capitalize(s1));
    console.log(lastLetter(s1));

  </script>
</body>
</html>
